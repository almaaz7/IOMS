databases:
  - name: inventory-db
    databaseName: inventory
    plan: free

services:
  - type: web
    name: inventory-backend
    runtime: docker
    plan: free
    rootDir: backend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: inventory-db
          property: connectionString
      - key: CORS_ORIGINS
        value: "*"
      - key: LOW_STOCK_THRESHOLD
        value: "10"
